name: Generate API and Update Timestamps

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master (history files)
        uses: actions/checkout@v3
        with:
          ref: master
          token: ${{ secrets.GH_PAT }}

      - name: Checkout gh-pages (for api folder)
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages-repo
          token: ${{ secrets.GH_PAT }}

      - name: Update lastUpdated in history
        run: |
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          sed -i "s/lastUpdated:.*/lastUpdated: $current_time/" history/landovh-ru.yml

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add history/landovh-ru.yml
          git commit -m "Force update lastUpdated" || echo "No changes"
          git push origin master

      - name: Build api/summary.json
        run: |
          mkdir -p gh-pages-repo/api
          echo '[' > gh-pages-repo/api/summary.json

          first=true
          for file in history/*.yml; do
            [ -f "$file" ] || continue

            name=$(basename "$file" .yml)
            status=$(grep -oP 'status:\s*\K.*' "$file" | head -1)
            uptime=$(grep -oP 'uptime:\s*\K.*' "$file" | head -1 || echo "100")
            lastChecked=$(grep -oP 'lastUpdated:\s*\K.*' "$file" | head -1 || echo "")

            name=$(echo "$name" | sed 's/-/./')
            [ -z "$uptime" ] && uptime=100

            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> gh-pages-repo/api/summary.json
            fi

            echo "  { \"name\": \"$name\", \"status\": \"$status\", \"uptime\": $uptime, \"lastChecked\": \"$lastChecked\" }" >> gh-pages-repo/api/summary.json
          done
          echo ']' >> gh-pages-repo/api/summary.json

          cat gh-pages-repo/api/summary.json

      - name: Push to gh-pages
        run: |
          cd gh-pages-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add api/summary.json
          git commit --allow-empty -m "Auto-update api/summary.json" || echo "No changes"
          git push origin gh-pages
